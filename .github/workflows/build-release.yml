name: Build and Release

on:
  push:
    branches: [master, main]
    paths:
      - 'distro/**'
      - 'mkmelinux.py'
      - 'runinpodman.py'
      - 'globalpatches/**'
      - 'distro-templates/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Required for HARDDISK builds — Incus launches a VM inside the Podman container
      # and needs this kernel module for the vsock channel. Safe to ignore on ISO/V86 builds.
      # GitHub-hosted runners have /dev/kvm available and pass it through --privileged Podman,
      # but vhost_vsock is not guaranteed — if missing, HARDDISK builds may fail at the Incus step.
      - name: Load vhost_vsock module
        run: sudo modprobe vhost_vsock || true

      - name: Install host tools
        run: sudo apt-get install -y --no-install-recommends qemu-utils zip

      - name: Build distro
        run: python3 runinpodman.py

      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=build-$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect and publish artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          UPLOADS=()

          # ISO image
          if [ -f output/linux.iso ]; then
            echo "Found output/linux.iso"
            UPLOADS+=(output/linux.iso)
          fi

          # VM disk — convert the raw image to QCOW2 for distribution.
          if [ -f output/harddisk.img ]; then
            echo "Found output/harddisk.img — converting to QCOW2..."
            qemu-img convert -f raw -O qcow2 output/harddisk.img harddisk.qcow2
            UPLOADS+=(harddisk.qcow2)
          fi

          # v86 browser VM — detected by presence of index.html in output/
          if [ -f output/index.html ]; then
            echo "Found v86 output/ — zipping..."
            zip -r v86-output.zip output/
            UPLOADS+=(v86-output.zip)
          fi

          if [ ${#UPLOADS[@]} -eq 0 ]; then
            echo "::error::No build artifacts found — did the build succeed?"
            exit 1
          fi

          # GitHub caps release assets at 2 GiB per file. Compressing doesn't
          # help (the payload is already an xz squashfs), so split oversized
          # artifacts into parts that reassemble with:  cat <name>.part-* > <name>
          FINAL_UPLOADS=()
          SPLIT_NOTE=""
          for f in "${UPLOADS[@]}"; do
            if [ "$(stat -c%s "$f")" -ge 2000000000 ]; then
              echo "$f exceeds the 2 GiB release asset limit — splitting..."
              split -b 1900M -d "$f" "$f.part-"
              FINAL_UPLOADS+=("$f".part-*)
              SPLIT_NOTE="$SPLIT_NOTE"$'\n'"- \`$(basename "$f")\` exceeds GitHub's 2 GiB asset limit and was uploaded in parts. Reassemble it with: \`cat $(basename "$f").part-* > $(basename "$f")\`"
            else
              FINAL_UPLOADS+=("$f")
            fi
          done

          NOTES="Automated build from commit \`${{ github.sha }}\` on branch \`${{ github.ref_name }}\`."
          if [ -f distro/description.txt ]; then
            NOTES="$NOTES"$'\n\n'"$(cat distro/description.txt)"
          fi
          if [ -n "$SPLIT_NOTE" ]; then
            NOTES="$NOTES"$'\n'"$SPLIT_NOTE"
          fi

          echo "Uploading: ${FINAL_UPLOADS[*]}"
          gh release create "$TAG" "${FINAL_UPLOADS[@]}" \
            --title "Build $TAG" \
            --notes "$NOTES"
